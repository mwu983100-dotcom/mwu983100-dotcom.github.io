        // ========== 获取页面元素 ==========
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        
        const apiUrlInput = document.getElementById('apiUrl');
        const apiKeyInput = document.getElementById('apiKey');
        const apiModelInput = document.getElementById('apiModel');
        const userNameInput = document.getElementById('userName');
        
        // ========== 切换设置面板 ==========
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('show');
        });
        
        // ========== 预设模型填充 ==========
        document.querySelectorAll('.model-preset').forEach(preset => {
            preset.addEventListener('click', () => {
                apiUrlInput.value = preset.dataset.url;
                apiModelInput.value = preset.dataset.model;
                alert(`已填充 ${preset.textContent} 配置，记得填密钥`);
            });
        });
        
        // ========== 加载配置 ==========
        function loadSettings() {
            const settings = localStorage.getItem('apiSettings');
            if (settings) {
                try {
                    const config = JSON.parse(settings);
                    apiUrlInput.value = config.url || '';
                    apiKeyInput.value = config.key || '';
                    apiModelInput.value = config.model || '';
                    userNameInput.value = config.userName || '用户';
                } catch (e) {}
            } else {
                userNameInput.value = '用户';
            }
        }
        
        // ========== 保存配置 ==========
        function saveSettings() {
            const config = {
                url: apiUrlInput.value.trim(),
                key: apiKeyInput.value.trim(),
                model: apiModelInput.value.trim(),
                userName: userNameInput.value.trim() || '用户'
            };
            
            if (!config.url || !config.key || !config.model) {
                alert('请填写API地址、密钥和模型名称');
                return;
            }
            
            localStorage.setItem('apiSettings', JSON.stringify(config));
            updateWelcomeMessage();
            settingsPanel.classList.remove('show');
            alert('配置已保存！');
        }
        
        document.getElementById('saveSettings').addEventListener('click', saveSettings);
        
        // ========== 获取当前配置 ==========
        function getCurrentConfig() {
            const settings = localStorage.getItem('apiSettings');
            return settings ? JSON.parse(settings) : null;
        }
        
        function getCurrentUserName() {
            const config = getCurrentConfig();
            return config?.userName || '用户';
        }
        
        // ========== 聊天历史 ==========
        let conversationHistory = [];
        
        function loadChatHistory() {
            const history = localStorage.getItem('chatHistory');
            if (history) {
                try {
                    conversationHistory = JSON.parse(history);
                } catch (e) {
                    conversationHistory = [];
                }
            }
        }
        
        function saveChatHistory() {
            const toSave = conversationHistory.slice(-50);
            localStorage.setItem('chatHistory', JSON.stringify(toSave));
        }
        
        function displayHistory() {
            if (conversationHistory.length === 0) {
                showOpeningOptions();
                return;
            }
            
            clearChatArea();
            conversationHistory.forEach(msg => {
                if (msg.role === 'user' || msg.role === 'assistant') {
                    appendMessage(msg.content, msg.role === 'user' ? 'user' : 'ai');
                }
            });
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function clearChatArea() {
            chatArea.innerHTML = '';
        }
        
        function appendMessage(content, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender === 'user' ? 'user-message' : 'ai-message'}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            messageDiv.appendChild(bubble);
            chatArea.appendChild(messageDiv);
        }
        
        function addMessage(content, sender) {
            appendMessage(content, sender);
            const role = sender === 'user' ? 'user' : 'assistant';
            conversationHistory.push({ role: role, content: content });
            saveChatHistory();
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message';
            loadingDiv.id = 'loadingIndicator';
            const loadingBubble = document.createElement('div');
            loadingBubble.className = 'loading-dots';
            loadingBubble.innerHTML = '<span></span><span></span><span></span>';
            loadingDiv.appendChild(loadingBubble);
            chatArea.appendChild(loadingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function removeLoading() {
            const loading = document.getElementById('loadingIndicator');
            if (loading) loading.remove();
        }
        
        // ========== 显示开场白按钮 ==========
        function showOpeningOptions() {
            clearChatArea();
            
            const container = document.createElement('div');
            container.className = 'opening-buttons';
            
            OPENING_LINES.forEach((line, index) => {
                const btn = document.createElement('div');
                btn.className = 'opening-btn';
                btn.innerHTML = `<span>${line.emoji}</span> ${line.short}`;
                btn.onclick = () => selectOpening(index);
                container.appendChild(btn);
            });
            
            chatArea.appendChild(container);
        }
        
        // ========== 选择开场白（支持 {{User}}、{{Users}}、{{user}} 等写法） ==========
        function selectOpening(index) {
            const line = OPENING_LINES[index];
            const userName = getCurrentUserName();
            // 不区分大小写替换所有 {{user}} 和 {{users}} 变体
            const finalMessage = line.full.replace(/\{\{user(s?)\}\}/gi, userName);
            addMessage(finalMessage, 'ai');
            const buttons = document.querySelector('.opening-buttons');
            if (buttons) buttons.remove();
        }
        
        function updateWelcomeMessage() {
            if (conversationHistory.length === 0) {
                showOpeningOptions();
            }
        }
        
        // ========== 发送消息 ==========
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            const config = getCurrentConfig();
            if (!config || !config.key) {
                alert('请先在设置中填写API密钥');
                return;
            }
            
            addMessage(message, 'user');
            userInput.value = '';
            showLoading();
            
            try {
                const userName = getCurrentUserName();
                const systemPromptWithName = YOUR_SYSTEM_PROMPT + `\n请称呼用户为“${userName}”。`;
                
                const messagesForAPI = [
                    { role: 'system', content: systemPromptWithName },
                    ...conversationHistory.slice(-10)
                ];
                
                const response = await fetch(config.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.key}`
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: messagesForAPI,
                        temperature: 0.8
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API错误 (${response.status}): ${errorText.substring(0, 100)}`);
                }
                
                const data = await response.json();
                removeLoading();
                
                let aiReply = '';
                if (data.choices && data.choices[0].message) {
                    aiReply = data.choices[0].message.content;
                } else if (data.choices && data.choices[0].text) {
                    aiReply = data.choices[0].text;
                } else if (data.output && data.output.text) {
                    aiReply = data.output.text;
                } else {
                    aiReply = '收到回复，但格式未知：' + JSON.stringify(data).substring(0, 200);
                }
                
                addMessage(aiReply, 'ai');
            } catch (error) {
                removeLoading();
                addMessage('❌ 出错了：' + error.message, 'ai');
                console.error(error);
            }
        }
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // ========== 初始化 ==========
        function init() {
            loadSettings();
            loadChatHistory();
            displayHistory();
        }
        
        init();
    </script>
